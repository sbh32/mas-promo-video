name: Render Video
on:
  push:
    branches: [ main, master ]
  workflow_dispatch:

jobs:
  render:
    name: Render Video
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: '20'

      - name: Install dependencies
        run: npm install

      - name: Render Video
        run: npx remotion render src/index.ts MasPromo out/mas-promo-video.mp4

      - name: Upload Video Artifact
        uses: actions/upload-artifact@v4
        with:
          name: Rendered-Video
          path: out/mas-promo-video.mp4
