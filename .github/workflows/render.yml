name: Render Remotion Video

on:
  push:
    branches:
      - main
  workflow_dispatch:

jobs:
  render:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm

      - name: Install dependencies
        run: npm ci

      - name: Install Chrome
        run: npx remotion browser ensure

      - name: Render WhatsappPromo
        run: npx remotion render WhatsappPromo out/WhatsappPromo.mp4

      - name: Upload rendered video
        uses: actions/upload-artifact@v4
        with:
          name: WhatsappPromo
          path: out/WhatsappPromo.mp4
          retention-days: 7
